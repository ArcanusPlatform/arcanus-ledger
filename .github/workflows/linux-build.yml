name: Linux Build

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  linux-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libsecret-1-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux bundle
        run: tar -czf arcanus-ledger-linux.tar.gz -C build/linux/x64/release bundle

      - name: Archive Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: arcanus-ledger-linux
          path: arcanus-ledger-linux.tar.gz
